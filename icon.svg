  <!-- wheels -->
  <circle cx="192" cy="384" r="20" fill="#D4AF37"/>
  <circle cx="336" cy="384" r="20" fill="#D4AF37"/>
  <!-- plus sign -->
  <path d="M280 224v80M240 264h80" fill="none" stroke="#D4AF37" stroke-width="20" stroke-linecap="round"/>
  <!-- dollar line through cart -->
  <path d="M200 280c0-24 32-24 32 0s-32 24-32 48 32 24 32 0" fill="none" stroke="#D4AF37" stroke-width="14" stroke-linecap="round"/>
